<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌀 Токамак Симулятор (ЕТВП) - v3</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050510; font-family: 'Segoe UI', sans-serif; }
        #info {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.6); padding: 15px 25px; border-radius: 8px;
            pointer-events: none; z-index: 10;
        }
        #stats {
            position: absolute; bottom: 30px; right: 30px; color: #fff;
            background: rgba(0,0,0,0.6); padding: 15px 25px; border-radius: 8px;
            pointer-events: none; z-index: 10; text-align: right;
        }
        .badge {
            position: absolute; top: 20px; right: 30px; color: #aaa;
            background: rgba(0,0,0,0.5); padding: 8px 16px; border-radius: 20px;
            font-size: 14px; z-index: 10; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">
        <h2>🌀 Токамак: Резонансное удержание (ЕТВП)</h2>
        <p>⚡ ПРОБЕЛ — повысить когерентность (C) и включить резонанс</p>
        <p>💡 Плазма ярче и стабильнее при высокой C</p>
    </div>
    <div id="stats">
        <div>🌀 Когерентность (C): <span id="c-value">0.00</span></div>
        <div>⏱️ Время удержания (τ_E): <span id="tau-value">0.00</span> с</div>
        <div>📡 Частота модуляции: 50 кГц</div>
    </div>
    <div class="badge">
        🔘 Резонанс: <span id="resonance-status">ВЫКЛ</span>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Сцена ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 6, 15);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;
        controls.enableZoom = true;
        controls.target.set(0, 0, 0);
        
        // --- Свет (усиленный) ---
        scene.add(new THREE.AmbientLight(0x404060));
        const light1 = new THREE.PointLight(0xffaa88, 1.5);
        light1.position.set(8, 12, 8);
        scene.add(light1);
        const light2 = new THREE.PointLight(0x88aaff, 0.8);
        light2.position.set(-8, 4, -10);
        scene.add(light2);
        const light3 = new THREE.PointLight(0xffffff, 0.5);
        light3.position.set(0, 10, 0);
        scene.add(light3);
        
        // --- Звёзды (фон) ---
        const starsGeo = new THREE.BufferGeometry();
        const starsPos = new Float32Array(2000 * 3);
        for (let i = 0; i < 2000 * 3; i+=3) {
            starsPos[i] = (Math.random() - 0.5) * 200;
            starsPos[i+1] = (Math.random() - 0.5) * 200;
            starsPos[i+2] = (Math.random() - 0.5) * 200;
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
        scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.15})));
        
        // --- Тор (вакуумная камера) ---
        const torusGeo = new THREE.TorusGeometry(4.0, 1.2, 32, 64);
        const torusMat = new THREE.MeshStandardMaterial({ 
            color: 0x88aacc, 
            transparent: true, 
            opacity: 0.15,
            side: THREE.DoubleSide
        });
        const torus = new THREE.Mesh(torusGeo, torusMat);
        torus.rotation.x = Math.PI / 2;
        scene.add(torus);
        
        // Каркас
        const wireframeTorus = new THREE.Mesh(
            new THREE.TorusGeometry(4.0, 1.2, 16, 48),
            new THREE.MeshBasicMaterial({ color: 0x88aaff, wireframe: true, transparent: true, opacity: 0.1 })
        );
        wireframeTorus.rotation.x = Math.PI / 2;
        scene.add(wireframeTorus);
        
        // --- ПЛАЗМА (ГАРАНТИРОВАННО ВИДИМАЯ) ---
        const plasmaGeo = new THREE.TorusGeometry(4.0, 0.8, 64, 100);
        const plasmaMat = new THREE.MeshStandardMaterial({ 
            color: 0xff5500, 
            emissive: 0xff4400,
            transparent: false,      // НЕПРОЗРАЧНАЯ
            roughness: 0.3,
            metalness: 0.0
        });
        const plasma = new THREE.Mesh(plasmaGeo, plasmaMat);
        plasma.rotation.x = Math.PI / 2;
        scene.add(plasma);
        
        // Дополнительное свечение вокруг плазмы
        const plasmaGlowGeo = new THREE.TorusGeometry(4.0, 0.9, 32, 80);
        const plasmaGlowMat = new THREE.MeshBasicMaterial({ 
            color: 0xff6600, 
            transparent: true, 
            opacity: 0.3,
            side: THREE.DoubleSide
        });
        const plasmaGlow = new THREE.Mesh(plasmaGlowGeo, plasmaGlowMat);
        plasmaGlow.rotation.x = Math.PI / 2;
        scene.add(plasmaGlow);
        
        // --- Магнитные катушки ---
        const coils = [];
        const coilCount = 12;
        
        for (let i = 0; i < coilCount; i++) {
            const angle = (i / coilCount) * Math.PI * 2;
            const coil = new THREE.Mesh(
                new THREE.TorusGeometry(1.6, 0.12, 8, 24),
                new THREE.MeshStandardMaterial({ color: 0xccaa88, emissive: 0x332211 })
            );
            coil.position.x = Math.cos(angle) * 5.5;
            coil.position.z = Math.sin(angle) * 5.5;
            coil.position.y = 0;
            
            coil.quaternion.setFromUnitVectors(
                new THREE.Vector3(0, 0, 1),
                new THREE.Vector3(Math.cos(angle), 0, Math.sin(angle))
            );
            
            scene.add(coil);
            coils.push(coil);
        }
        
        // --- Когерентность и удержание ---
        let coherence = 0.0;
        let tauE = 0.0;
        let resonance = false;
        
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                resonance = true;
                document.getElementById('resonance-status').textContent = 'ВКЛ';
                e.preventDefault();
            }
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                resonance = false;
                document.getElementById('resonance-status').textContent = 'ВЫКЛ';
                e.preventDefault();
            }
        });
        
        // --- Анимация ---
        function animate() {
            requestAnimationFrame(animate);
            
            if (resonance) {
                coherence = Math.min(0.999, coherence + 0.005);
            } else {
                coherence = Math.max(0.0, coherence - 0.002);
            }
            
            tauE = 0.5 + coherence * 5.0;
            
            // Визуализация резонанса 50 кГц (микровибрация)
            const freqEffect = Math.sin(Date.now() * 0.5) * 0.015 * (1 - coherence);
            
            // Цвет плазмы зависит от C
            const hue = 0.03 + coherence * 0.2;
            const color = new THREE.Color().setHSL(hue, 1.0, 0.5);
            plasma.material.color.set(color);
            plasma.material.emissive.set(color);
            plasma.material.emissiveIntensity = 0.8 + coherence * 2.5;
            
            plasmaGlow.material.color.set(color);
            plasmaGlow.material.opacity = 0.2 + coherence * 0.4;
            
            if (resonance) {
                plasma.scale.setScalar(1.0 + freqEffect);
                plasmaGlow.scale.setScalar(1.0 + freqEffect * 1.5);
            } else {
                plasma.scale.setScalar(1.0);
                plasmaGlow.scale.setScalar(1.0);
            }
            
            coils.forEach((coil) => {
                coil.material.emissiveIntensity = 0.2 + coherence * 0.6;
            });
            
            torus.material.emissive = new THREE.Color(0x224466);
            torus.material.emissiveIntensity = coherence * 0.3;
            
            document.getElementById('c-value').textContent = coherence.toFixed(3);
            document.getElementById('tau-value').textContent = tauE.toFixed(2);
            
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
