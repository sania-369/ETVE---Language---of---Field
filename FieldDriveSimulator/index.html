<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Полевой Двигатель (ЕТВП)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050510; font-family: 'Segoe UI', sans-serif; }
        #info {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.6); padding: 15px 25px; border-radius: 8px;
            pointer-events: none; z-index: 10;
        }
        #stats {
            position: absolute; bottom: 30px; right: 30px; color: #fff;
            background: rgba(0,0,0,0.6); padding: 15px 25px; border-radius: 8px;
            pointer-events: none; z-index: 10; text-align: right;
        }
        .badge {
            position: absolute; top: 20px; right: 30px; color: #aaa;
            background: rgba(0,0,0,0.5); padding: 8px 16px; border-radius: 20px;
            font-size: 14px; z-index: 10; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">
        <h2>🚀 Полевой Двигатель (ЕТВП)</h2>
        <p>⚡ ПРОБЕЛ — тяга ВВЕРХ (поле смещается вниз)</p>
        <p>⚡ ENTER — тяга ВПЕРЁД (поле смещается назад)</p>
    </div>
    <div id="stats">
        <div>🌀 Когерентность (C): <span id="c-value">0.00</span></div>
        <div>📈 Ускорение: <span id="accel-value">0.00</span> g</div>
        <div>⚡ Тяга: <span id="thrust-value">0.00</span> Н/кг</div>
        <div>🎮 Режим: <span id="mode-value">ОЖИДАНИЕ</span></div>
    </div>
    <div class="badge">
        🔘 Двигатель: <span id="engine-status">ВЫКЛ</span>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Сцена ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 15);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enableZoom = true;
        controls.target.set(0, 0, 0);
        
        // --- Свет ---
        scene.add(new THREE.AmbientLight(0x404060));
        const light1 = new THREE.PointLight(0xffaa88, 1.2);
        light1.position.set(5, 8, 10);
        scene.add(light1);
        const light2 = new THREE.PointLight(0x88aaff, 0.8);
        light2.position.set(-5, 3, -10);
        scene.add(light2);
        
        // --- Звёзды (статичный фон) ---
        const starsGeo = new THREE.BufferGeometry();
        const starsPos = new Float32Array(3000 * 3);
        for (let i = 0; i < 3000 * 3; i+=3) {
            starsPos[i] = (Math.random() - 0.5) * 300;
            starsPos[i+1] = (Math.random() - 0.5) * 300;
            starsPos[i+2] = (Math.random() - 0.5) * 300;
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
        scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.2})));
        
        // --- ГРУППА АППАРАТА (будет двигаться) ---
        const craftGroup = new THREE.Group();
        scene.add(craftGroup);
        
        // --- Тор (аппарат) ---
        const craftGeo = new THREE.TorusGeometry(1.8, 0.5, 16, 48);
        const craftMat = new THREE.MeshStandardMaterial({
          color: 0x88aacc, 
            emissive: 0x224466,
            roughness: 0.4,
            metalness: 0.3
        });
        const craft = new THREE.Mesh(craftGeo, craftMat);
        craft.rotation.x = Math.PI / 2;
        craft.rotation.z = 0.3;
        craftGroup.add(craft);
        
        // --- Центральная сфера (ядро) ---
        const coreGeo = new THREE.SphereGeometry(0.6, 24, 12);
        const coreMat = new THREE.MeshStandardMaterial({ color: 0xffaa88, emissive: 0x553322 });
        const core = new THREE.Mesh(coreGeo, coreMat);
        craft.add(core);
        
        // --- Поле вокруг аппарата (частицы) ---
        const fieldParticles = [];
        const particleCount = 1000;
        const particleGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        
        for (let i = 0; i < particleCount; i++) {
            const r = 2.5 + Math.random() * 2.5;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            
            particlePositions[i*3] = Math.sin(phi) * Math.cos(theta) * r;
            particlePositions[i*3+1] = Math.sin(phi) * Math.sin(theta) * r;
            particlePositions[i*3+2] = Math.cos(phi) * r;
            
            fieldParticles.push({
                baseX: particlePositions[i*3],
                baseY: particlePositions[i*3+1],
                baseZ: particlePositions[i*3+2]
            });
        }
        
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ 
            color: 0x88aaff, 
            size: 0.1,
            transparent: true,
            blending: THREE.AdditiveBlending
        });
        const particles = new THREE.Points(particleGeo, particleMat);
        craftGroup.add(particles);
        
        // --- Вектор тяги (стрелка) ---
        const arrowHelper = new THREE.ArrowHelper(new THREE.Vector3(0, 1, 0), new THREE.Vector3(0, -1.5, 0), 0.5, 0xff5500);
        craftGroup.add(arrowHelper);
        
        // --- Когерентность и режимы ---
        let coherence = 0.0;
        let mode = 'none'; // 'up', 'forward'
        let velocity = new THREE.Vector3(0, 0, 0);
        
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                mode = 'up';
                document.getElementById('engine-status').textContent = 'ТЯГА ВВЕРХ';
                document.getElementById('mode-value').textContent = 'ВВЕРХ';
                e.preventDefault();
            } else if (e.code === 'Enter') {
                mode = 'forward';
                document.getElementById('engine-status').textContent = 'ТЯГА ВПЕРЁД';
                document.getElementById('mode-value').textContent = 'ВПЕРЁД';
                e.preventDefault();
            }
        });
        
        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') {
                mode = 'none';
                document.getElementById('engine-status').textContent = 'ВЫКЛ';
                document.getElementById('mode-value').textContent = 'ОЖИДАНИЕ';
                e.preventDefault();
            }
        });
        
        // --- Анимация ---
        function animate() {
            requestAnimationFrame(animate);
            
            if (mode !== 'none') {
                coherence = Math.min(0.999, coherence + 0.005);
            } else {
                coherence = Math.max(0.0, coherence - 0.003);
            }
            
            // Смещение поля в зависимости от режима
            const positions = particles.geometry.attributes.position.array;
            let offsetX = 0, offsetY = 0, offsetZ = 0;
            
            if (mode === 'up') {
                offsetY = -coherence * 2.0; // поле вниз
            } else if (mode === 'forward') {
            offsetZ = -coherence * 2.0; // поле назад
            }
            
            for (let i = 0; i < particleCount; i++) {
                const base = fieldParticles[i];
                positions[i*3] = base.baseX + offsetX;
                positions[i*3+1] = base.baseY + offsetY;
                positions[i*3+2] = base.baseZ + offsetZ;
            }
            particles.geometry.attributes.position.needsUpdate = true;
            
            // Цвет частиц
            const hue = 0.55 + coherence * 0.25;
            const color = new THREE.Color().setHSL(hue, 0.9, 0.5);
            particles.material.color.set(color);
            craft.material.emissiveIntensity = 0.3 + coherence * 0.8;
            
            // Тяга и ускорение
            const thrust = coherence * 0.008;
            const acceleration = thrust / 0.0098;
            
            // Движение аппарата
            if (coherence > 0.1) {
                if (mode === 'up') {
                    velocity.y += thrust * 0.015;
                    arrowHelper.setDirection(new THREE.Vector3(0, 1, 0));
                } else if (mode === 'forward') {
                    velocity.z += thrust * 0.015;
                    arrowHelper.setDirection(new THREE.Vector3(0, 0, 1));
                }
            }
            
            velocity.multiplyScalar(0.99);
            craftGroup.position.add(velocity);
            
            // Длина стрелки
            arrowHelper.setLength(thrust * 300, 0.2 * thrust * 300);
            
            controls.target.copy(craftGroup.position);
            
            document.getElementById('c-value').textContent = coherence.toFixed(3);
            document.getElementById('accel-value').textContent = acceleration.toFixed(3);
            document.getElementById('thrust-value').textContent = thrust.toFixed(4);
            
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
