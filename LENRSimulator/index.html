<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ LENR - Шаг 1 (Решётка)</title>
    <style>body { margin: 0; overflow: hidden; background: #0a0a14; }</style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a14);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 6, 12);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.8;
        
        scene.add(new THREE.AmbientLight(0x404060));
        const light1 = new THREE.PointLight(0xffaa88, 1.2);
        light1.position.set(5, 10, 7);
        scene.add(light1);
        const light2 = new THREE.PointLight(0x88aaff, 0.6);
        light2.position.set(-5, 3, -8);
        scene.add(light2);
        
        const spacing = 1.4;
        const atomGeo = new THREE.SphereGeometry(0.18, 16, 8);
        const atomMat = new THREE.MeshStandardMaterial({ color: 0x88aacc, emissive: 0x224466, emissiveIntensity: 0.4 });
        
        for (let i = -2; i <= 2; i++) {
            for (let j = -2; j <= 2; j++) {
                for (let k = -2; k <= 2; k++) {
                    const atom = new THREE.Mesh(atomGeo, atomMat.clone());
                    atom.position.set(i * spacing, j * spacing, k * spacing);
                    scene.add(atom);
                }
            }
        }
        
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
