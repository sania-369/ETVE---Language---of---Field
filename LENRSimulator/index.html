<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ LENR Симулятор (ЕТВП)</title>
    <style>
        body { margin: 0; overflow: hidden; background: black; font-family: 'Segoe UI', sans-serif; }
        #info {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px;
            pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body>
    <div id="info">
        <h2>⚡ LENR: Резонансная накачка (ЕТВП)</h2>
        <p>🖱️ Клик — добавить ион водорода</p>
        <p>⚡ ПРОБЕЛ — включить резонанс (3.5 ТГц)</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Сцена
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 6, 12);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;
        controls.target.set(0, 0, 0);
        
        // Свет
        scene.add(new THREE.AmbientLight(0x404060));
        const light = new THREE.PointLight(0xffaa88, 1);
        light.position.set(5, 10, 7);
        scene.add(light);
        
        // Решётка никеля (кубическая, упрощённая)
        const lattice = [];
        const spacing = 1.2;
        for (let i = -2; i <= 2; i++) {
            for (let j = -2; j <= 2; j++) {
                for (let k = -2; k <= 2; k++) {
                    const atom = new THREE.Mesh(
                        new THREE.SphereGeometry(0.15, 8, 4),
                        new THREE.MeshStandardMaterial({ color: 0x88aacc, emissive: 0x224466, emissiveIntensity: 0.3 })
                    );
                    atom.position.set(i * spacing, j * spacing, k * spacing);
                    scene.add(atom);
                    lattice.push(atom);
                }
            }
        }
        
        // Ионы водорода
        const ions = [];
        
        function addIon(x, y, z) {
            const ion = new THREE.Mesh(
                new THREE.SphereGeometry(0.2, 16, 8),
                new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0x442200 })
            );
            ion.position.set(x, y, z);
            scene.add(ion);
            ions.push(ion);
        }
        
        // Клик для добавления иона
        renderer.domElement.addEventListener('click', e => {
            const rect = renderer.domElement.getBoundingClientRect();
            const mouse = new THREE.Vector2(
                ((e.clientX - rect.left) / rect.width) * 2 - 1,
                -((e.clientY - rect.top) / rect.height) * 2 + 1
            );
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
            const target = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(plane, target)) {
                addIon(target.x, target.y, target.z);
            }
        });
        
        // Анимация
        function animate() {
            requestAnim
ationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
