<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ LENR Симулятор (ЕТВП)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a14; font-family: 'Segoe UI', sans-serif; }
        #info {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.6); padding: 15px 25px; border-radius: 8px;
            pointer-events: none; z-index: 10;
        }
        #cop-panel {
            position: absolute; bottom: 30px; right: 30px; color: #fff;
            background: rgba(0,0,0,0.6); padding: 15px 25px; border-radius: 8px;
            pointer-events: none; z-index: 10; text-align: right;
        }
        #cop-value { font-size: 24px; font-weight: bold; color: #88ff88; }
    </style>
</head>
<body>
    <div id="info">
        <h2>⚡ LENR: Резонансная накачка (ЕТВП)</h2>
        <p>🖱️ Клик — добавить ион | ⚡ ПРОБЕЛ — резонанс</p>
    </div>
    <div id="cop-panel">
        <div>⚡ COP: <span id="cop-value">0.00</span></div>
        <div>Вход: <span id="energy-in">0</span> | Выход: <span id="energy-out">0</span></div>
        <div>Ионов: <span id="ion-count">0</span> | Слияний: <span id="fusion-count">0</span></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Сцена
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a14);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 6, 12);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.8;
        
        // Свет
        scene.add(new THREE.AmbientLight(0x404060));
        const light1 = new THREE.PointLight(0xffaa88, 1.2);
        light1.position.set(5, 10, 7);
        scene.add(light1);
        const light2 = new THREE.PointLight(0x88aaff, 0.6);
        light2.position.set(-5, 3, -8);
        scene.add(light2);
        
        // Решётка никеля
        const atoms = [];
        const barriers = [];
        const spacing = 1.4;
        
        const atomGeo = new THREE.SphereGeometry(0.18, 16, 8);
        const atomMat = new THREE.MeshStandardMaterial({ color: 0x88aacc, emissive: 0x224466, emissiveIntensity: 0.4 });
        const barrierGeo = new THREE.SphereGeometry(0.55, 24, 12);
        const barrierMat = new THREE.MeshPhongMaterial({ color: 0x88aaff, transparent: true, opacity: 0.12 });
        
        for (let i = -2; i <= 2; i++) {
            for (let j = -2; j <= 2; j++) {
                for (let k = -2; k <= 2; k++) {
                    const pos = new THREE.Vector3(i * spacing, j * spacing, k * spacing);
                    
                    const atom = new THREE.Mesh(atomGeo, atomMat.clone());
                    atom.position.copy(pos);
                    scene.add(atom);
                    atoms.push({ mesh: atom, pos: pos });
                    
                    const barrier = new THREE.Mesh(barrierGeo, barrierMat.clone());
                    barrier.position.copy(pos);
                    scene.add(barrier);
                    barriers.push({ mesh: barrier });
                }
            }
        }
        // Ионы
        const ions = [];
        const ionGeo = new THREE.SphereGeometry(0.22, 16, 8);
        const ionMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0x553300, emissiveIntensity: 0.6 });
        
        function addIon(x, y, z) {
            const ion = {
                mesh: new THREE.Mesh(ionGeo, ionMat.clone()),
                pos: new THREE.Vector3(x, y, z),
                vel: new THREE.Vector3(0, 0, 0),
                fused: false
            };
            ion.mesh.position.copy(ion.pos);
            scene.add(ion.mesh);
            ions.push(ion);
            updateUI();
        }
        
        addIon(2.0, 0.8, 1.5);
        addIon(-1.8, -1.0, 2.2);
        addIon(2.5, -1.5, -1.2);
        addIon(-2.2, 1.2, -2.0);
        
        // Статистика
        let energyIn = 4;
        let energyOut = 0;
        let fusionCount = 0;
        
        function updateUI() {
            const cop = energyIn > 0 ? (energyOut / energyIn).toFixed(2) : '0.00';
            document.getElementById('cop-value').textContent = cop;
            document.getElementById('energy-in').textContent = energyIn;
            document.getElementById('energy-out').textContent = energyOut;
            document.getElementById('ion-count').textContent = ions.length;
            document.getElementById('fusion-count').textContent = fusionCount;
        }
        
        renderer.domElement.addEventListener('click', (e) => {
            const rect = renderer.domElement.getBoundingClientRect();
            const mouse = new THREE.Vector2(
                ((e.clientX - rect.left) / rect.width) * 2 - 1,
                -((e.clientY - rect.top) / rect.height) * 2 + 1
            );
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
            const target = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(plane, target)) {
                addIon(target.x, target.y, target.z);
                energyIn += 1;
                updateUI();
            }
        });
        
        let resonance = false;
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                resonance = true;
                e.preventDefault();
            }
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                resonance = false;
                e.preventDefault();
            }
        });
        
        function animate() {
            requestAnimationFrame(animate);
            
            atoms.forEach((item, idx) => {
                if (resonance) {
                    item.mesh.scale.setScalar(1 + Math.sin(Date.now() * 0.025 + idx) * 0.025);
                    item.mesh.material.emissiveIntensity = 0.9;
                } else {
                    item.mesh.scale.setScalar(1);
                    item.mesh.material.emissiveIntensity = 0.4;
                }
            });
            
            barriers.forEach(item => {
                if (resonance) {
                    item.mesh.scale.setScalar(0.6);
                    item.mesh.material.opacity = 0.05;
                } else {
                    item.mesh.scale.setScalar(1.0);
                    item.mesh.material.opacity = 0.12;
                }
            });
            
            ions.forEach(ion => {
                if (ion.fused) return;
                
                if (resonance) {
                    let nearestAtom = null;
                    let minDist = Infinity;
                    atoms.forEach(atom => {
                        const dist = ion.pos.distanceTo(atom.pos);
                        if (dist < minDist) { minDist = dist; nearestAtom = atom; }
                    });
                    
                    if (nearestAtom) {
                        const dir = new THREE.Vector3().subVecto
                        rs(nearestAtom.pos, ion.pos);
                        const dist = dir.length();
                        if (dist > 0.3) {
                            dir.normalize();
                            ion.vel.addScaledVector(dir, 0.0025);
                        }
                    }
                    
                    atoms.forEach(atom => {
                        const dist = ion.pos.distanceTo(atom.pos);
                        if (dist < 0.45 && !ion.fused) {
                            ion.fused = true;
                            ion.mesh.material.emissive.setHex(0xff4444);
                            ion.mesh.material.emissiveIntensity = 1.5;
                            ion.mesh.scale.setScalar(0.5);
                            energyOut += 5;
                            fusionCount++;
                            updateUI();
                        }
                    });
                }
                
                ion.vel.multiplyScalar(0.95);
                ion.pos.add(ion.vel);
                ion.mesh.position.copy(ion.pos);
                
                if (!ion.fused) {
                    if (resonance) {
                        ion.mesh.material.emissive.setHex(0xff8800);
                        ion.mesh.material.emissiveIntensity = 1.2;
                    } else {
                        ion.mesh.material.emissive.setHex(0x553300);
                        ion.mesh.material.emissiveIntensity = 0.6;
                    }
                }
            });
            
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        updateUI();
    </script>
</body>
</html>
