<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ LENR - Шаг 3.2 (Движение ионов)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a14; font-family: 'Segoe UI', sans-serif; }
        #info {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.6); padding: 15px 25px; border-radius: 8px;
            pointer-events: none; z-index: 10;
        }
        #stats {
            position: absolute; bottom: 30px; right: 30px; color: white;
            background: rgba(0,0,0,0.6); padding: 12px 20px; border-radius: 8px;
            pointer-events: none; z-index: 10;
        }
        .badge {
            position: absolute; top: 20px; right: 30px; color: #aaa;
            background: rgba(0,0,0,0.5); padding: 8px 16px; border-radius: 20px;
            font-size: 14px; z-index: 10; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">
        <h2>⚡ LENR: Шаг 3.2 (Движение ионов)</h2>
        <p>🖱️ Клик — добавить ион | ⚡ ПРОБЕЛ — резонанс (ионы движутся)</p>
    </div>
    <div id="stats">
        <div>🌌 Ионов: <span id="ion-count">0</span></div>
    </div>
    <div class="badge">
        🔘 Резонанс: <span id="resonance-status">ВЫКЛ</span>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a14);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 6, 12);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.8;
        controls.enableZoom = true;
        controls.target.set(0, 0, 0);
        
        scene.add(new THREE.AmbientLight(0x404060));
        const light1 = new THREE.PointLight(0xffaa88, 1.2);
        light1.position.set(5, 10, 7);
        scene.add(light1);
        const light2 = new THREE.PointLight(0x88aaff, 0.6);
        light2.position.set(-5, 3, -8);
        scene.add(light2);
        
        const atoms = [];
        const spacing = 1.4;
        const atomGeo = new THREE.SphereGeometry(0.18, 16, 8);
        const atomMat = new THREE.MeshStandardMaterial({ color: 0x88aacc, emissive: 0x224466, emissiveIntensity: 0.4 });
        
        for (let i = -2; i <= 2; i++) {
            for (let j = -2; j <= 2; j++) {
                for (let k = -2; k <= 2; k++) {
                    const atom = new THREE.Mesh(atomGeo, atomMat.clone());
                    atom.position.set(i * spacing, j * spacing, k * spacing);
                    scene.add(atom);
                    atoms.push({ mesh: atom, pos: atom.position.clone() });
                }
            }
        }
        
        const ions = [];
        const ionGeo = new THREE.SphereGeometry(0.22, 16, 8);
        const ionMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0x553300, emissiveIntensity: 0.6 });
        
        function addIon(x, y, z) {
            const ion = {
                mesh: new THREE.Mesh(ionGeo, ionMat.clone()),
                pos: new THREE.Vector3(x, y, z),
                vel: new THREE.Vector3(0, 0, 0)
            };
            ion.mesh.position.copy(ion.pos);
            scene.add(ion.mesh);
            ions.push(ion);
            document.getElementById('ion-count').textContent = ions.length;
        }
        
        addIon(2.0, 0.8, 1.5);
        addIon(-1.8, -1.0, 2.2);
        addIon(2.5, -1.5, -1.2);
        
        renderer.domElement.addEventListener('click', (e) => {
            const rect = renderer.domElement.getBoundingClientRect();
            const mouse = new THREE.Vector2(
                ((e.clientX - rect.left) / rect.width) * 2 - 1,
                -((e.clientY - rect.top) / rect.height) * 2 + 1
            );
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
            const target = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(plane, target)) {
                addIon(target.x, target.y, target.z);
            }
        });
        
        let resonance = false;
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                resonance = true;
                document.getElementById('resonance-status').textContent = 'ВКЛ';
                e.preventDefault();
            }
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                resonance = false;
                document.getElementById('resonance-status').textContent = 'ВЫКЛ';
                e.preventDefault();
            }
        });
        
        function animate() {
            requestAnimationFrame(animate);
            
            atoms.forEach((item, idx) => {
                if (resonance) {
                    item.mesh.scale.setScalar(1 + Math.sin(Date.now() * 0.025 + idx) * 0.025);
                    item.mesh.material.emissiveIntensity = 0.9;
                } else {
                    item.mesh.scale.setScalar(1);
                    item.mesh.material.emissiveIntensity = 0.4;
                }
            });
            
            // ДВИЖЕНИЕ ИОНОВ
            ions.forEach(ion => {
                if (resonance) {
                    let nearestAtom = null;
                    let minDist = Infinity;
                    atoms.forEach(atom => {
                        const dist = ion.pos.distanceTo(atom.pos);
                        if (dist < minDist) {
                            minDist = dist;
                            nearestAtom = atom;
                        }
                    });
                    
                    if (nearestAtom) {
                        const dir = new THREE.Vector3().subVectors(nearestAtom.pos, ion.pos);
                        const dist = dir.length();
                        if (dist > 0.3) {
                            dir.normalize();
                            ion.vel.addScaledVector(dir, 0.0025);
                        }
                    }
                    
                    ion.mesh.material.emissive.setHex(0xff8800);
                    ion.mesh.material.emissiveIntensity = 1.2;
                } else {
                    ion.mesh.material.emissive.setHex(0x553300);
                    ion.mesh.material.emissiveIntensity = 0.6;
                }
                
                ion.vel.multiplyScalar(0.95);
                ion.pos.add(ion.vel);
                ion.mesh.position.copy(ion.pos);
            });
            
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
