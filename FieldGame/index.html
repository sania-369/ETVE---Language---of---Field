<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>🌀 Полевой Симулятор (ЕТВП)</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 12px 20px;
            border-radius: 30px;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 20px;
            color: #ccc;
            background: rgba(20,20,30,0.7);
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(4px);
        }
        #status {
            position: absolute;
            bottom: 30px;
            right: 30px;
            color: #aaa;
            font-size: 12px;
            z-index: 10;
            background: rgba(0,0,0,0.3);
            padding: 6px 12px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div id="info">
        <h2>🌀 Полевой Симулятор (ЕТВП)</h2>
        <p>Когерентность (C): <span id="coherence-value">0.00</span> <span style="color: #aaa; font-size: 14px; margin-left: 15px;">⚡ Нажми и удерживай <strong>ПРОБЕЛ</strong></span></p>
        <p>Солитонов: <span id="soliton-count">0</span> <span style="color: #aaa; font-size: 14px; margin-left: 15px;">🖱️ Клик — создать солитон</span></p>
    </div>
    <div id="controls">
        🎮 <strong>Управление:</strong> ПРОБЕЛ — повысить когерентность | Клик — новый солитон | Колёсико — зум | ПКМ + движение — панорама
    </div>
    <div id="status">
        v1.0 · Язык Поля
    </div>

    <!-- Трёхмерная сцена -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Инициализация сцены ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        
        // Камера
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(20, 15, 30);
        camera.lookAt(0, 0, 0);
        
        // Рендер WebGL
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);
        
        // CSS2 Рендер для текстовых меток
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // Управление камерой
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;
        controls.enableZoom = true;
controls.enablePan = true;
        controls.maxPolarAngle = Math.PI / 1.8;
        controls.target.set(0, 0, 0);
        
        // --- Освещение ---
        // Окружающий свет
        scene.add(new THREE.AmbientLight(0x404060));
        // Основной направленный свет (тени)
        const dirLight = new THREE.DirectionalLight(0xffeedd, 1);
        dirLight.position.set(10, 30, 20);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        const d = 40;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 100;
        dirLight.shadow.bias = -0.0005;
        scene.add(dirLight);
        
        // Заполняющие света
        const fillLight1 = new THREE.PointLight(0x4466ff, 0.6);
        fillLight1.position.set(-15, 10, 20);
        scene.add(fillLight1);
        const fillLight2 = new THREE.PointLight(0xff9966, 0.4);
        fillLight2.position.set(20, 5, -25);
        scene.add(fillLight2);
        
        // --- Визуализация поля (сетка и свечение) ---
        const gridHelper = new THREE.GridHelper(60, 40, 0x88aaff, 0x334466);
        gridHelper.position.y = -0.5;
        scene.add(gridHelper);
        
        // Полевые линии (тороидальные кольца)
        const fieldRings = [];
        for (let i = 0; i < 8; i++) {
            const radius = 8 + i * 3;
            const tube = 0.03 + i * 0.01;
            const color = new THREE.Color().setHSL(0.6 + i * 0.03, 0.9, 0.4);
            const ring = new THREE.Mesh(
                new THREE.TorusGeometry(radius, tube, 16, 100),
                new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.3, transparent: true, opacity: 0.25 })
            );
            ring.rotation.x = Math.PI / 2;
            ring.rotation.z = i * 0.5;
            ring.receiveShadow = false;
            scene.add(ring);
            fieldRings.push({ mesh: ring, baseRadius: radius, baseColor: color });
        }
        
        // Звёздный фон (частицы)
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 2000;
        const starPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i += 3) {
            const r = 80 + Math.random() * 150;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            starPositions[i] = Math.sin(phi) * Math.cos(theta) * r;
            starPositions[i+1] = Math.sin(phi) * Math.sin(theta) * r;
            starPositions[i+2] = Math.cos(phi) * r;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({color: 0xffffff, size: 0.15, transparent: true});
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);
        
        // --- Данные симуляции ---
        const solitons = [];
        let coherence = 0.0;
        let globalCoherence = 0.0;
        
        // UI элементы
        const coherenceSpan = document.getElementById('coherence-value');
        const countSpan = document.getElementById('soliton-count');
        
        // Класс Солитона
        class Soliton {
            constructor(x, y, z) {
                this.position = new THREE.Vector3(x, y, z);
                this.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.15,
                    (Math.random() - 0.5) * 0.15,
                    (Math.random() - 0.5) * 0.15
                );
                this.mass = 0.8 + Math.random() * 1.5;
                this.radius = 0.6 * Math.sqrt(this.mass);
this.color = new THREE.Color().setHSL(0.1 + Math.random() * 0.2, 0.9, 0.55);
                
                // Создание 3D объекта
                const geometry = new THREE.SphereGeometry(this.radius, 32, 16);
                const material = new THREE.MeshStandardMaterial({ 
                    color: this.color,
                    emissive: this.color,
                    emissiveIntensity: 0.4,
                    roughness: 0.3,
                    metalness: 0.1
                });
                this.mesh = new THREE.Mesh(geometry, material);
                this.mesh.castShadow = true;
                this.mesh.receiveShadow = true;
                this.mesh.position.copy(this.position);
                scene.add(this.mesh);
                
                // Свечение вокруг солитона
                const glowGeo = new THREE.SphereGeometry(this.radius * 1.8, 24, 12);
                const glowMat = new THREE.MeshBasicMaterial({ 
                    color: this.color, 
                    transparent: true, 
                    opacity: 0.15,
                    depthWrite: false
                });
                this.glow = new THREE.Mesh(glowGeo, glowMat);
                this.glow.position.copy(this.position);
                scene.add(this.glow);
                
                // Текстовая метка (CSS2D)
                const div = document.createElement('div');
                div.textContent = '⬤';
                div.style.color = '#fff';
                div.style.fontSize = '14px';
                div.style.fontWeight = 'bold';
                div.style.textShadow = '0 0 15px ' + this.color.getStyle();
                div.style.pointerEvents = 'none';
                this.label = new CSS2DObject(div);
                this.label.position.copy(this.position).add(new THREE.Vector3(0, this.radius + 1.0, 0));
                scene.add(this.label);
            }
            
            update(solitonsArray, coh) {
                // Взаимодействие с другими солитонами
                solitonsArray.forEach(other => {
                    if (other === this) return;
                    const dir = new THREE.Vector3().subVectors(other.position, this.position);
                    const dist = Math.max(dir.length(), 0.01);
                    const forceMagnitude = 0.012 * this.mass * other.mass / (dist * dist);
                    dir.normalize();
                    
                    // Гравитационное притяжение
                    this.velocity.addScaledVector(dir, forceMagnitude);
                    
                    // Отталкивание при столкновении
                    const minDist = this.radius + other.radius;
                    if (dist < minDist) {
                        const push = dir.clone().multiplyScalar(-0.8);
                        this.velocity.add(push);
                    }
                });
                
                // Влияние когерентности (замедление, упорядочивание)
                if (coh > 0.5) {
                    this.velocity.multiplyScalar(0.992);
                    // Притяжение к центру при высокой когерентности
                    const toCenter = new THREE.Vector3(0, 0, 0).sub(this.position);
                    const distToCenter = toCenter.length();
                    if (distToCenter > 15) {
                        toCenter.normalize().multiplyScalar(0.005 * (coh - 0.5) * 2);
                        this.velocity.add(toCenter);
                    }
                }
                
                // Обновление позиции
                this.position.add(this.velocity);
                
                // Мягкие границы (возврат в область)
                const limit = 22;
                ['x', 'y', 'z'].forEach(axis => {
                    if (Math.abs(this.position[axis]) > limit) {
                        this.position[axis] = Math.sign(this.position[axis]) * limit;
                        this.velocity[axis] *= -0.5;
                    }
});
                
                // Обновление визуальных объектов
                this.mesh.position.copy(this.position);
                this.glow.position.copy(this.position);
                this.label.position.copy(this.position).add(new THREE.Vector3(0, this.radius + 1.0, 0));
                
                // Цвет зависит от когерентности
                const hue = 0.1 + (coh * 0.3);
                const col = new THREE.Color().setHSL(hue, 0.9, 0.55);
                this.mesh.material.color.set(col);
                this.mesh.material.emissive.set(col);
                this.mesh.material.emissiveIntensity = 0.3 + coh * 0.8;
                this.glow.material.color.set(col);
                this.glow.material.opacity = 0.1 + coh * 0.25;
                this.glow.scale.setScalar(1 + coh * 0.5);
            }
            
            dispose() {
                scene.remove(this.mesh);
                scene.remove(this.glow);
                scene.remove(this.label);
            }
        }
        
        // --- Управление когерентностью ---
        let spacePressed = false;
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                spacePressed = true;
                e.preventDefault();
            }
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                spacePressed = false;
                e.preventDefault();
            }
        });
        
        // Создание солитона по клику
        renderer.domElement.addEventListener('click', (event) => {
            // Проверяем, не кликнули ли по UI (грубо)
            if (event.target !== renderer.domElement) return;
            
            // Рейкастинг для определения точки на плоскости
            const rect = renderer.domElement.getBoundingClientRect();
            const mouse = new THREE.Vector2();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            
            // Создаём плоскость для пересечения (Y=0)
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
            const target = new THREE.Vector3();
            raycaster.ray.intersectPlane(plane, target);
            
            if (target) {
                // Добавляем небольшой разброс по Y
                target.y = (Math.random() - 0.5) * 4;
                solitons.push(new Soliton(target.x, target.y, target.z));
                controls.autoRotate = true;
            }
        });
        
        // --- Анимация и обновление ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Обновление когерентности
            if (spacePressed) {
                globalCoherence = Math.min(1.0, globalCoherence + 0.008);
            } else {
                globalCoherence = Math.max(0.0, globalCoherence - 0.003);
            }
            
            // Динамическое изменение поля от когерентности
            scene.background.setHSL(0.66, 0.8, 0.03 + globalCoherence * 0.08);
            fieldRings.forEach((item, index) => {
                item.mesh.material.emissiveIntensity = 0.2 + globalCoherence * 0.5;
                item.mesh.material.opacity = 0.2 + globalCoherence * 0.2;
                item.mesh.scale.setScalar(1 + globalCoherence * 0.1 * Math.sin(index * 0.9));
            });
            
            // Вращение звёзд
            stars.rotation.y += 0.0002;
            stars.rotation.x += 0.0001;
            
            // Обновление солитонов
            solitons.forEach(s => s.update(solitons, globalCoherence));
            
            // Автоповорот камеры
            controls.autoRotate = true;
            controls.update();
            
            // UI
coherenceSpan.textContent = globalCoherence.toFixed(2);
            countSpan.textContent = solitons.length;
            
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        animate();
        
        // --- Ресайз ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Стартовые солитоны для красоты
        setTimeout(() => {
            for (let i = 0; i < 5; i++) {
                const angle = (i / 5) * Math.PI * 2;
                const radius = 7;
                solitons.push(new Soliton(Math.cos(angle) * radius, (Math.random()-0.5)*3, Math.sin(angle) * radius));
            }
        }, 100);
    </script>
</body>
</html>
