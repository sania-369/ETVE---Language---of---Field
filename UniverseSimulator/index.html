<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌀 Первичный Войд (ЕТВП)</title>
    <style>
        body { margin: 0; overflow: hidden; background: black; }
        #info {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.6); padding: 15px 25px; border-radius: 8px;
            pointer-events: none; z-index: 10; font-family: 'Segoe UI', sans-serif;
        }
        #controls {
            position: absolute; bottom: 30px; left: 20px; color: #ccc;
            background: rgba(0,0,0,0.6); padding: 12px 20px; border-radius: 8px;
            pointer-events: none; z-index: 10; font-family: 'Segoe UI', sans-serif;
        }
        #stats {
            position: absolute; bottom: 30px; right: 30px; color: white;
            background: rgba(0,0,0,0.6); padding: 15px 25px; border-radius: 8px;
            pointer-events: none; z-index: 10; font-family: 'Segoe UI', sans-serif;
        }
    </style>
</head>
<body>
    <div id="info">
        <h2>🌀 Первичный Войд (Сознание Абсолюта)</h2>
        <p>🖱️ Клик — создать галактику</p>
        <p>⚡ ПРОБЕЛ — повысить когерентность</p>
    </div>
    <div id="controls">
        🎮 Мышь — вращение | Колёсико — зум | ПКМ — панорама
    </div>
    <div id="stats">
        <div>🌀 C: <span id="c-value">0.0000</span></div>
        <div>🌌 Галактик: <span id="count-value">0</span></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- СЦЕНА ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(30, 20, 40);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.2;
        controls.target.set(0, 0, 0);
        
        // --- СВЕТ ---
        scene.add(new THREE.AmbientLight(0x404060));
        const light1 = new THREE.PointLight(0xffccaa, 1.0);
        light1.position.set(20, 30, 20);
        scene.add(light1);
        const light2 = new THREE.PointLight(0xaaccff, 0.8);
        light2.position.set(-20, 10, -30);
        scene.add(light2);
        
        // --- СЕТКА ---
        const gridHelper = new THREE.GridHelper(60, 20, 0x88aaff, 0x334466);
        scene.add(gridHelper);
        
        // --- ЗВЁЗДЫ ---
        const starsGeo = new THREE.BufferGeometry();
        const starsPos = new Float32Array(2000 * 3);
        for (let i = 0; i < 2000 * 3; i+=3) {
            starsPos[i] = (Math.random() - 0.5) * 200;
            starsPos[i+1] = (Math.random() - 0.5) * 200;
            starsPos[i+2] = (Math.random() - 0.5) * 200;
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
        scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.15})));
        
        // --- ПЕРВИЧНЫЙ ВОЙД (чистое сознание) ---
        const voidMesh = new THREE.Mesh(
            new THREE.SphereGeometry(12.0, 64, 32),
            new THREE.MeshPhongMaterial({
                color: 0x0a0a1a,
                transparent: true,
                opacity:
                    0.3,
                depthWrite: false
            })
        );
        voidMesh.position.set(0, 0, 0);
        scene.add(voidMesh);
        
        // --- ГАЛАКТИКИ ---
        const galaxies = [];
        let coherence = 0.0;
        
        class Galaxy {
            constructor(x, y, z) {
                this.pos = new THREE.Vector3(x, y, z);
                this.vel = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.1,
                    (Math.random() - 0.5) * 0.1,
                    (Math.random() - 0.5) * 0.1
                );
                this.color = new THREE.Color().setHSL(0.05 + Math.random()*0.15, 0.9, 0.55);
                
                this.mesh = new THREE.Mesh(
                    new THREE.SphereGeometry(0.7, 24, 12),
                    new THREE.MeshStandardMaterial({ color: this.color, emissive: this.color, emissiveIntensity: 0.5 })
                );
                this.mesh.position.copy(this.pos);
                scene.add(this.mesh);
                
                this.glow = new THREE.Mesh(
                    new THREE.SphereGeometry(1.3, 16),
                    new THREE.MeshBasicMaterial({ color: this.color, transparent: true, opacity: 0.2 })
                );
                this.glow.position.copy(this.pos);
                scene.add(this.glow);
            }
            
            update(coh) {
                // Притяжение к центру (к Войду)
                const toCenter = new THREE.Vector3().subVectors(new THREE.Vector3(0,0,0), this.pos);
                const dist = Math.max(toCenter.length(), 0.5);
                const gravity = 0.01 / (dist * dist);
                toCenter.normalize();
                this.vel.addScaledVector(toCenter, gravity);
                
                // Отталкивание (чтобы не упасть внутрь Войда)
                if (dist < 14.0) {
                    const push = this.pos.clone().normalize();
                    this.vel.addScaledVector(push, 0.04);
                }
                
                // Когерентность: замедление
                if (coh > 0.3) {
                    this.vel.multiplyScalar(0.996);
                }
                
                this.pos.add(this.vel);
                
                // Границы
                const limit = 45;
                ['x','y','z'].forEach(axis => {
                    if (Math.abs(this.pos[axis]) > limit) {
                        this.pos[axis] = Math.sign(this.pos[axis]) * limit;
                        this.vel[axis] *= -0.3;
                    }
                });
                
                this.mesh.position.copy(this.pos);
                this.glow.position.copy(this.pos);
                
                const hue = 0.05 + coh * 0.2;
                const col = new THREE.Color().setHSL(hue, 0.9, 0.55);
                this.mesh.material.color.set(col);
                this.mesh.material.emissive.set(col);
                this.glow.material.color.set(col);
            }
        }
        
        // Стартовые галактики
        for (let i = 0; i < 6; i++) {
            const angle = (i / 6) * Math.PI * 2;
            const r = 18;
            galaxies.push(new Galaxy(Math.cos(angle)*r, (Math.random()-0.5)*4, Math.sin(angle)*r));
        }
        
        // Управление
        let spacePressed = false;
        window.addEventListener('keydown', e => { if (e.code === 'Space') { spacePressed = true; e.preventDefault(); } });
        window.addEventListener('keyup', e => { if (e.code === 'Space') { spacePressed = false; e.preventDefault(); } });
        
        renderer.domElement.addEventListener('click', e => {
            const rect = renderer.domElement.getBoundingClientRect();
            const mouse = new THREE.Vector2(
                ((e.clientX - rect.left) / rect.width) * 2 - 1,
                -((e.clientY - rect.top) / rect.height) * 2 + 1
            );
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera


(mouse, camera);
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
            const target = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(plane, target)) {
                target.y = (Math.random() - 0.5) * 6;
                galaxies.push(new Galaxy(target.x, target.y, target.z));
            }
        });
        
        // Анимация
        function animate() {
            requestAnimationFrame(animate);
            
            if (spacePressed) coherence = Math.min(0.99999, coherence + 0.002);
            else coherence = Math.max(0.0, coherence - 0.001);
            
            // Войд "дышит" от когерентности
            voidMesh.material.opacity = 0.25 + coherence * 0.15;
            voidMesh.scale.setScalar(1.0 - coherence * 0.05);
            
            galaxies.forEach(g => g.update(coherence));
            
            document.getElementById('c-value').textContent = coherence.toFixed(4);
            document.getElementById('count-value').textContent = galaxies.length;
            
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
