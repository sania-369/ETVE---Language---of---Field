<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌀 Войды и Галактики (ЕТВП) - Простая версия</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: black; }
        #info {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.7); padding: 15px 25px; border-radius: 8px;
            pointer-events: none; z-index: 10; backdrop-filter: blur(4px);
        }
        #controls {
            position: absolute; bottom: 30px; left: 20px; color: #ccc;
            background: rgba(20,20,30,0.8); padding: 12px 20px; border-radius: 8px;
            font-size: 14px; pointer-events: none; z-index: 10;
        }
        #thermo {
            position: absolute; bottom: 30px; right: 30px; color: #fff;
            background: rgba(0,0,0,0.6); padding: 15px 25px; border-radius: 8px;
            text-align: right; font-size: 16px; z-index: 10;
        }
        #thermo div { margin: 5px 0; }
    </style>
</head>
<body>
    <div id="info">
        <h2>🌀 Войды и Галактики (ЕТВП)</h2>
        <p>🖱️ Клик — создать галактику</p>
        <p>⚡ ПРОБЕЛ — повысить когерентность (C → 0.99999)</p>
        <p>🌑 Тёмные сферы — войды (отталкивают при низкой C)</p>
    </div>
    <div id="controls">
        🎮 Мышь — вращение | Колёсико — зум | ПКМ — панорама
    </div>
    <div id="thermo">
        <div>🌀 C: <span id="c-value">0.000</span></div>
        <div>🌌 Галактик: <span id="count-value">0</span></div>
        <div>🌑 Войдов: 5</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Сцена (гарантированно не чёрная) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a20); // Тёмно-синий фон
        
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(30, 20, 40);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.3;
        controls.enableZoom = true;
        controls.target.set(0, 0, 0);
        
        // --- Свет ---
        scene.add(new THREE.AmbientLight(0x404060));
        const light1 = new THREE.PointLight(0xffaa88, 1, 0, 0);
        light1.position.set(20, 30, 20);
        scene.add(light1);
        const light2 = new THREE.PointLight(0x88aaff, 0.8);
        light2.position.set(-20, 10, -30);
        scene.add(light2);
        
        // --- Сетка (чтобы было видно пространство) ---
        const gridHelper = new THREE.GridHelper(60, 20, 0x88aaff, 0x334466);
        scene.add(gridHelper);
        
        // --- Звёзды (фон) ---
        const starsGeo = new THREE.BufferGeometry();
        const starsPos = new Float32Array(2000 * 3);
        for (let i = 0; i < 2000 * 3; i+=3) {
            starsPos[i] = (Math.random() - 0.5) * 200;
            starsPos[i+1] = (Math.random() - 0.5) * 200;
            starsPos[i+2] = (Math.random() - 0.5) * 200;
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
        scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.15})));
        // --- Войды (тёмные сферы) ---
        const voids = [];
        const voidMeshes = [];
        const voidPositions = [
            { x: 18, y: 4, z: 12 }, { x: -16, y: -6, z: 18 }, { x: 14, y: 10, z: -20 },
            { x: -22, y: -4, z: -14 }, { x: 8, y: -14, z: -10 }
        ];
        
        voidPositions.forEach(pos => {
            voids.push({ pos: new THREE.Vector3(pos.x, pos.y, pos.z), radius: 11 });
            const cloud = new THREE.Mesh(
                new THREE.SphereGeometry(11, 32, 16),
                new THREE.MeshPhongMaterial({ color: 0x1a1a3a, transparent: true, opacity: 0.5, depthWrite: false })
            );
            cloud.position.copy(voids[voids.length-1].pos);
            scene.add(cloud);
            voidMeshes.push(cloud);
        });
        
        // --- Галактики ---
        const galaxies = [];
        let coherence = 0.0;
        
        class Galaxy {
            constructor(x, y, z) {
                this.pos = new THREE.Vector3(x, y, z);
                this.vel = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.15,
                    (Math.random() - 0.5) * 0.15,
                    (Math.random() - 0.5) * 0.15
                );
                this.mass = 1.0 + Math.random() * 1.5;
                this.radius = 0.6 * Math.sqrt(this.mass);
                this.color = new THREE.Color().setHSL(0.05 + Math.random()*0.15, 0.9, 0.55);
                
                this.mesh = new THREE.Mesh(
                    new THREE.SphereGeometry(this.radius, 24, 12),
                    new THREE.MeshStandardMaterial({ color: this.color, emissive: this.color, emissiveIntensity: 0.5 })
                );
                this.mesh.position.copy(this.pos);
                scene.add(this.mesh);
                
                this.glow = new THREE.Mesh(
                    new THREE.SphereGeometry(this.radius * 1.8, 16, 8),
                    new THREE.MeshBasicMaterial({ color: this.color, transparent: true, opacity: 0.2 })
                );
                this.glow.position.copy(this.pos);
                scene.add(this.glow);
            }
            
            update(coh) {
                // Гравитация к другим галактикам
                galaxies.forEach(other => {
                    if (other === this) return;
                    const dir = new THREE.Vector3().subVectors(other.pos, this.pos);
                    const dist = Math.max(dir.length(), 0.5);
                    const force = 0.005 * this.mass * other.mass / (dist * dist);
                    dir.normalize();
                    this.vel.addScaledVector(dir, force);
                });
                
                // Отталкивание от войдов (эффект тем сильнее, чем НИЖЕ когерентность)
                const voidStrength = Math.max(0.05, 1.0 - coh * 1.2);
                voids.forEach(v => {
                    const dir = new THREE.Vector3().subVectors(this.pos, v.pos);
                    const dist = Math.max(dir.length(), 0.5);
                    if (dist < v.radius * 1.8) {
                        dir.normalize();
                        const force = 0.02 * voidStrength * (1 - dist / (v.radius * 1.8));
                        this.vel.addScaledVector(dir, force);
                    }
                });
                
                // Когерентность: трение + притяжение к центру
                if (coh > 0.3) {
                    this.vel.multiplyScalar(0.99);
                    const toCenter = new THREE.Vector3(0, 0, 0).sub(this.pos);
                    const dist = toCenter.length();
                    if (dist > 1.0) {
                        toCenter.normalize().multiplyScalar(0.0015 * (coh - 0.3) * 8);
                        this.vel.add(toCenter);
                    }
                }
                
                this.pos.add(this.vel);
                
                // Границы
                const limit = 40;
                ['x','y','z'].forEach(axis => {


if (Math.abs(this.pos[axis]) > limit) {
                        this.pos[axis] = Math.sign(this.pos[axis]) * limit;
                        this.vel[axis] *= -0.3;
                    }
                });
                
                this.mesh.position.copy(this.pos);
                this.glow.position.copy(this.pos);
                
                const hue = 0.05 + coh * 0.25;
                const col = new THREE.Color().setHSL(hue, 0.9, 0.55);
                this.mesh.material.color.set(col);
                this.mesh.material.emissive.set(col);
                this.mesh.material.emissiveIntensity = 0.4 + coh * 0.8;
                this.glow.material.color.set(col);
                this.glow.material.opacity = 0.15 + coh * 0.2;
            }
        }
        
        // Стартовые галактики
        for (let i = 0; i < 6; i++) {
            const angle = (i / 6) * Math.PI * 2;
            galaxies.push(new Galaxy(Math.cos(angle)*14, (Math.random()-0.5)*6, Math.sin(angle)*14));
        }
        
        // Управление
        let spacePressed = false;
        window.addEventListener('keydown', e => { if (e.code === 'Space') { spacePressed = true; e.preventDefault(); } });
        window.addEventListener('keyup', e => { if (e.code === 'Space') { spacePressed = false; e.preventDefault(); } });
        
        renderer.domElement.addEventListener('click', e => {
            const rect = renderer.domElement.getBoundingClientRect();
            const mouse = new THREE.Vector2(
                ((e.clientX - rect.left) / rect.width) * 2 - 1,
                -((e.clientY - rect.top) / rect.height) * 2 + 1
            );
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
            const target = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(plane, target)) {
                target.y = (Math.random() - 0.5) * 8;
                galaxies.push(new Galaxy(target.x, target.y, target.z));
            }
        });
        
        // Анимация
        function animate() {
            requestAnimationFrame(animate);
            
            if (spacePressed) coherence = Math.min(0.99999, coherence + 0.002);
            else coherence = Math.max(0.0, coherence - 0.001);
            
            voidMeshes.forEach(mesh => mesh.material.opacity = 0.45 * (1 - coherence * 0.7));
            galaxies.forEach(g => g.update(coherence));
            
            document.getElementById('c-value').textContent = coherence.toFixed(4);
            document.getElementById('count-value').textContent = galaxies.length;
            
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
