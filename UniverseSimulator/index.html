<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌀 Сверхмассивная ЧД (ЕТВП)</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #050510; }
        #info {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.6); padding: 15px 25px; border-radius: 8px;
            pointer-events: none; z-index: 10; backdrop-filter: blur(4px);
        }
        #controls {
            position: absolute; bottom: 30px; left: 20px; color: #ccc;
            background: rgba(0,0,0,0.6); padding: 12px 20px; border-radius: 8px;
            pointer-events: none; z-index: 10;
        }
        #stats {
            position: absolute; bottom: 30px; right: 30px; color: white;
            background: rgba(0,0,0,0.6); padding: 15px 25px; border-radius: 8px;
            pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body>
    <div id="info">
        <h2>🌀 Сверхмассивная ЧД и Галактики</h2>
        <p>🖱️ Клик — создать галактику</p>
        <p>⚡ ПРОБЕЛ — повысить когерентность (C → 0.99999)</p>
    </div>
    <div id="controls">
        🎮 Мышь — вращение | Колёсико — зум | ПКМ — панорама
    </div>
    <div id="stats">
        <div>🌀 C: <span id="c-value">0.0000</span></div>
        <div>🌌 Галактик: <span id="count-value">0</span></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- БАЗОВАЯ СЦЕНА (гарантированно не чёрная) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a20);
        
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(30, 20, 40);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.3;
        controls.enableZoom = true;
        controls.target.set(0, 0, 0);
        
        // --- СВЕТ ---
        scene.add(new THREE.AmbientLight(0x404060));
        const light1 = new THREE.PointLight(0xffaa88, 1.2);
        light1.position.set(20, 30, 20);
        scene.add(light1);
        const light2 = new THREE.PointLight(0x88aaff, 0.8);
        light2.position.set(-20, 10, -30);
        scene.add(light2);
        
        // --- СЕТКА (чтобы точно было видно пространство) ---
        const gridHelper = new THREE.GridHelper(60, 20, 0x88aaff, 0x334466);
        scene.add(gridHelper);
        
        // --- ЗВЁЗДЫ ---
        const starsGeo = new THREE.BufferGeometry();
        const starsPos = new Float32Array(2000 * 3);
        for (let i = 0; i < 2000 * 3; i+=3) {
            starsPos[i] = (Math.random() - 0.5) * 200;
            starsPos[i+1] = (Math.random() - 0.5) * 200;
            starsPos[i+2] = (Math.random() - 0.5) * 200;
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
        scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.15})));
        
        // --- ЦЕНТРАЛЬНАЯ ЧД (войд) ---
        const blackHole = {
            pos: new THREE.Vector3(0, 0, 0),
            radius: 12.0
        };
        
        const bhMesh = new THREE.Mesh(
            new THREE.SphereGeometry(blackHole.radius, 64, 32),
            new THREE.MeshPhongMaterial({ color: 0x0a0a1a, transparent: true, opacity: 0.35 })
        );
        bhMesh.position.copy(blackHole.pos);
        scene.add(bhMesh);
        
        // Горизонт событий (кольцо)
        const horizon = new THREE.Mesh(
            new THREE.TorusGeometry(blackHole.radius * 0.4, 0.15, 16, 64),
            new THREE.MeshStandardMaterial({ color: 0xff8844, emissive: 0x442200 })
        );
        horizon.position.copy(blackHole.pos);
        horizon.rotation.x = Math.PI / 2;
        scene.add(horizon);
        
        // Аккреционный диск
        const disk = new THREE.Mesh(
            new THREE.TorusGeometry(blackHole.radius * 0.9, 0.1, 16, 128),
            new THREE.MeshStandardMaterial({ color: 0x88aaff, transparent: true, opacity: 0.5 })
        );
        disk.position.copy(blackHole.pos);
        disk.rotation.x = Math.PI / 2 + 0.1;
        scene.add(disk);
        
        // --- ГАЛАКТИКИ ---
        const galaxies = [];
        let coherence = 0.0;
        
        class Galaxy {
            constructor(x, y, z) {
                this.pos = new THREE.Vector3(x, y, z);
                this.vel = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.1,
                    (Math.random() - 0.5) * 0.1,
                    (Math.random() - 0.5) * 0.1
                );
                this.mass = 1.0;
                this.radius = 0.7;
                this.color = new THREE.Color().setHSL(0.05 + Math.random()*0.15, 0.9, 0.55);
                
                this.mesh = new THREE.Mesh(
                    new THREE.SphereGeometry(this.radius, 24, 12),
                    new THREE.MeshStandardMaterial({ color: this.color, emissive: this.color, emissiveIntensity: 0.5 })
                );
                this.mesh.position.copy(this.pos);
                scene.add(this.mesh);
                
                this.glow = new THREE.Mesh(
                    new THREE.SphereGeometry(this.radius * 1.8, 16),
                    new THREE.MeshBasicMaterial({ color: this.color, transparent: true, opacity: 0.2 })
                );
                this.glow.position.copy(this.pos);
                scene.add(this.glow);
            }
            
            update(coh) {
                // Притяжение к центру
                const toCenter = new THREE.Vector3().subVectors(blackHole.pos, this.pos);
                const dist = Math.max(toCenter.length(), 0.5);
                const gravity = 0.012 / (dist * dist);
                toCenter.normalize();
                this.vel.addScaledVector(toCenter, gravity);
                
                // Отталкивание (чтобы не упасть в ЧД)
                if (dist < blackHole.radius * 1.2) {
                    const push = this.pos.clone().normalize();
                    this.vel.addScaledVector(push, 0.05);
                }
                
                // Когерентность: трение
                if (coh > 0.3) {
                    this.vel.multiplyScalar(0.995);
                }
                
                // Ограничение скорости
                if (this.vel.length() > 0.15) {
                    this.vel.normalize().multiplyScalar(0.15);
                }
                
                this.pos.add(this.vel);
                
                // Границы
                const limit = 45;
                ['x','y','z'].forEach(axis => {
                    if (Math.abs(this.pos[axis]) > limit) {
                        this.pos[axis] = Math.sign(this.pos[axis]) * limit;
                        this.vel[axis] *= -0.3;
                    }
                });
                
                this.mesh.position.copy(this.pos);
                this.glow.position.copy(this.pos);
                
                const hue = 0.05 + coh * 0.2;
                const col = new THREE.Color().setHSL(hue, 0.9, 0.55);
                this.mesh.material.color.set(col);


this.mesh.material.emissive.set(col);
                this.glow.material.color.set(col);
            }
        }
        
        // Стартовые галактики
        for (let i = 0; i < 6; i++) {
            const angle = (i / 6) * Math.PI * 2;
            const r = 18;
            galaxies.push(new Galaxy(Math.cos(angle)*r, (Math.random()-0.5)*4, Math.sin(angle)*r));
        }
        
        // Управление
        let spacePressed = false;
        window.addEventListener('keydown', e => { if (e.code === 'Space') { spacePressed = true; e.preventDefault(); } });
        window.addEventListener('keyup', e => { if (e.code === 'Space') { spacePressed = false; e.preventDefault(); } });
        
        renderer.domElement.addEventListener('click', e => {
            const rect = renderer.domElement.getBoundingClientRect();
            const mouse = new THREE.Vector2(
                ((e.clientX - rect.left) / rect.width) * 2 - 1,
                -((e.clientY - rect.top) / rect.height) * 2 + 1
            );
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
            const target = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(plane, target)) {
                target.y = (Math.random() - 0.5) * 6;
                galaxies.push(new Galaxy(target.x, target.y, target.z));
            }
        });
        
        // Анимация
        function animate() {
            requestAnimationFrame(animate);
            
            if (spacePressed) coherence = Math.min(0.99999, coherence + 0.002);
            else coherence = Math.max(0.0, coherence - 0.001);
            
            galaxies.forEach(g => g.update(coherence));
            
            document.getElementById('c-value').textContent = coherence.toFixed(4);
            document.getElementById('count-value').textContent = galaxies.length;
            
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
